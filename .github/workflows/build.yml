name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shield-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shield-backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend sources
        run: npm run check

  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --no-daemon --console=plain 2>&1 | tee gradle-build.log

      - name: Surface Gradle failure
        if: failure()
        shell: bash
        run: |
          grep -E "^(e: |FAILURE:|\\* What went wrong:|Caused by:|> Task .+ FAILED)" gradle-build.log | tail -n 50 | while IFS= read -r line; do
            printf '::error::%s\n' "$line"
          done

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-log
          path: gradle-build.log

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shield-antivirus-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Publish debug APK branch
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          test -n "${APK_PATH}"

          rm -rf /tmp/apk-publish
          mkdir -p /tmp/apk-publish
          cp "${APK_PATH}" /tmp/apk-publish/shield-antivirus-debug.apk
          cat > /tmp/apk-publish/BUILD_INFO.txt <<EOF
          Repository: ${GITHUB_REPOSITORY}
          Commit: ${GITHUB_SHA}
          Workflow Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          Built At: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          cd /tmp/apk-publish
          git init
          git checkout -b apk-builds
          git add shield-antivirus-debug.apk BUILD_INFO.txt
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish APK for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin apk-builds
