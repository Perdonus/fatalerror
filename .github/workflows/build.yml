name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shield-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shield-backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend sources
        run: npm run check

  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --no-daemon --console=plain 2>&1 | tee gradle-build.log

      - name: Surface Gradle failure
        if: failure()
        shell: bash
        run: |
          grep -E "^(e: |FAILURE:|\\* What went wrong:|Caused by:|> Task .+ FAILED)" gradle-build.log | tail -n 50 | while IFS= read -r line; do
            printf '::error::%s\n' "$line"
          done

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-log
          path: gradle-build.log

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shield-antivirus-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
